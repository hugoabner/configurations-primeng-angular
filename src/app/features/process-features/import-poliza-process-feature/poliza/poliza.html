<p-toast [position]="'top-right'" />
<main class="p-4 h-full">
  <!-- Contenedor con borde bonito, sombra y redondeado -->
  <div class="">
    <p-table
      class="border-collapse border border-surface-200 dark:border-surface-800"
      #dt2
      [resizableColumns]="true"
      columnResizeMode="expand"
      [columns]="selectedColumns"
      [scrollable]="true"
      scrollHeight="530px"
      [showGridlines]="true"
      [value]="history_polizas()"
      dataKey="excel.TIPODOC"
      [rows]="10"
      [rowsPerPageOptions]="[10, 15, 25, 50]"
      [loading]="loading"
      [paginator]="true"
      [globalFilterFields]="['excel.TIPODOC', 'excel.DOCUMENTO', 'excel.ASEGURADO', 'excel.CONTRATANTE', 'excel.ENDOSATARIO']"
      [tableStyle]="{ 'min-width': '75rem' }"
    >
      <!-- Caption -->
      <ng-template #caption>
        <div class="flex items-center justify-end gap-4">
          <p-button
            pTooltip="Importar Polizas"
            icon="pi pi-upload"
            [raised]="true"
            severity="success"
            tooltipPosition="bottom"
            size="small"
            (click)="fileInput.click()"
          />
          <input 
            type="file"
            accept=".xlsx"
            class="hidden"
            #fileInput
            (change)="onFileSelected($event)"
          >
            <!-- (click)="loadHistory()" -->
          <app-batch-history-popover
            [loading]="loadingHistory()"
            [importBatchHistory]="importBatchHistory()"
            (requestHistory)="loadHistory()"
            (batchSelected)="onBatchSelected($event)"
          />
          <p-button
            pTooltip="Ver actualizacion de Polizas"
            icon="pi pi-eye"
            [raised]="true"
            severity="info"
            tooltipPosition="bottom"
            size="small"
            (click)="viewPolizas(dt2._value)"
            />
          <p-button
            pTooltip="Exportar a Excel"
            icon="pi pi-download"
            [raised]="true"
            severity="success"
            tooltipPosition="bottom"
            size="small"
            (click)="exportExcel(dt2._value)"
          />
          <p-button
            pTooltip="Ver excel original"
            icon="pi pi-file"
            [raised]="true"
            severity="info"
            tooltipPosition="bottom"
            size="small"
            (click)="viewOriginalExcel()"
          />

          <p-iconfield iconPosition="left" class="">
            <p-inputicon>
              <i class="pi pi-search"></i>
            </p-inputicon>
            <input
              pInputText
              type="text"
              (input)="dt2.filterGlobal($event.target.value, 'contains')"
              placeholder="Buscar ..."
            />
            <!-- (input.debounce.5000)="onSearch($event.target.value)" -->
          </p-iconfield>
        </div>
      </ng-template>
      <!-- Header -->
      <ng-template #header let-columns>
        <!-- columns -->
        <tr>
          @for (col of columns; track col.field) {
            <th pResizableColumn>{{ col.header }}</th>
          }
        </tr>
        <!-- filters -->
        <tr>
          @for (col of columns; track col.field) {
            <th style="width: auto; min-width: 8rem">
              @if (col.filterType === 'multiselect') {
                <p-columnFilter [field]="col.field" matchMode="in" [showMenu]="false">
                  <ng-template pTemplate="filter" let-value let-filter="filterCallback">
                    <p-multiSelect
                      [ngModel]="value"
                      [options]="filterOptions()[col.field] || []"
                      placeholder="Filtrar"
                      (onChange)="filter($event.value)"
                      optionLabel="name"
                      optionValue="value"
                      appendTo="body"
                      display="chip"
                      [panelStyle]="{ minWidth: '2rem' }"
                    >
                      <ng-template let-option pTemplate="item">
                        <div class="flex items-center gap-2">
                          <span>{{ option.name }}</span>
                        </div>
                      </ng-template>
                    </p-multiSelect>
                  </ng-template>
                </p-columnFilter>
              } @else {
                <p-columnFilter
                  class="z-0"
                  type="text"
                  [field]="col.field"
                  placeholder="Buscar..."
                  ariaLabel="Buscar en {{ col.header }}"
                  filterOn="input"
                ></p-columnFilter>
              }
            </th>
          }
        </tr>
      </ng-template>
      <!-- Body -->
      <ng-template #body let-poliza let-columns="columns">
        <tr>
           @for (col of columns; track col.field) {
            <td>
              {{ getNestedValue(poliza, col.field) || '-' }}
            </td>
          }
        </tr>
      </ng-template>
      <!-- Empty Message -->
      <ng-template #emptymessage>
        <tr>
          <td colspan="43" class="text-center text-2xl">No se encontraron registros</td>
        </tr>
      </ng-template>
      <!-- paginator  left  -->
      <ng-template #paginatorleft>
        <div class="flex items-center gap-2">
          <p-multiselect
            display="chip"
            [style]="{ 'min-width': '200px' }"
            [options]="cols"
            [(ngModel)]="selectedColumns"
            optionLabel="header"
            selectedItemsLabel="{0} columnas seleccionadas"
            (onChange)="onColumnChange($event.value)"
            placeholder="Seleccionar columnas"
          />
        </div>
      </ng-template>
    </p-table>
  </div>
</main>
